name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Set SEVERA_EMAIL_MAP secret
        run: |
          if [ -n "$SEVERA_EMAIL_MAP" ]; then
            printf '%s' "$SEVERA_EMAIL_MAP" | npx wrangler secret put SEVERA_EMAIL_MAP --env ${{ inputs.environment }}
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SEVERA_EMAIL_MAP: ${{ secrets.SEVERA_EMAIL_MAP }}

      - name: Deploy to ${{ inputs.environment }}
        run: npx wrangler deploy --env ${{ inputs.environment }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
